<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Seat ELF Mongkrang</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f2f2f2;
    font-family:Arial, sans-serif;
    text-align:center;

    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    font-size:28px;
    margin-bottom:5px;
}

p{
    color:#666;
}

input{
    width:230px;
    padding:12px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:15px;
    margin-top:10px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#0d6efd;
    color:white;
    font-size:14px;
    cursor:pointer;
    margin-top:10px;
}

.info{
    margin-top:10px;
    color:#666;
    font-size:14px;
}

.bus{
    width:360px;
    margin:35px auto;
    background:white;
    border:7px solid #2f2bbd;
    border-radius:40px;
    padding:25px 15px 30px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.front{
    font-weight:bold;
    margin-bottom:20px;
    color:#444;
}

.row{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin:12px 0;
}

.seat{
    width:68px;
    height:68px;
    background:#1237c9;
    color:white;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:11px;
    cursor:pointer;
    transition:0.2s;
    padding:5px;
    box-sizing:border-box;
    word-break:break-word;
}

.seat:hover{
    transform:scale(1.05);
}

.driver{
    background:#ffd43b;
    color:black;
    cursor:default;
    font-weight:bold;
}

.booked{
    background:#ff5a5a;
}

.mine{
    background:#28a745;
}

.legend{
    margin-top:20px;
    font-size:13px;
    color:#444;
}

.legend div{
    margin:5px 0;
}

.dot{
    width:14px;
    height:14px;
    display:inline-block;
    border-radius:50%;
    margin-right:5px;
}

.blue{
    background:#1237c9;
}

.red{
    background:#ff5a5a;
}

.green{
    background:#28a745;
}

</style>
</head>

<body>

<h1>BOOKING SEAT ELF MONGKRANG</h1>

<p>Pilih kursi sebelum keberangkatan</p>

<input type="text" id="nameInput" placeholder="Masukkan nama panggilan">

<br>

<button onclick="saveName()">
Simpan Nama
</button>

<div class="info">
1 orang hanya bisa memilih 1 kursi
</div>

<div class="bus">

<div class="front">
DEPAN
</div>

<!-- BARIS 1 -->
<div class="row">

<div class="seat" 
id="seat-1" 
onclick="bookSeat(1)"
style="width:90px;">
1
</div>

<div class="seat" 
id="seat-2" 
onclick="bookSeat(2)"
style="width:90px;">
2
</div>

<div class="seat driver"
style="width:90px;">
SUPIR
</div>

</div>

<!-- BARIS 2 -->
<div class="row">

<div class="seat" id="seat-3" onclick="bookSeat(3)">
3
</div>

<div class="seat" id="seat-4" onclick="bookSeat(4)">
4
</div>

<div class="seat" id="seat-5" onclick="bookSeat(5)">
5
</div>

</div>

<!-- BARIS 3 -->
<div class="row">

<div class="seat" id="seat-6" onclick="bookSeat(6)">
6
</div>

<div class="seat" id="seat-7" onclick="bookSeat(7)">
7
</div>

<div class="seat" id="seat-8" onclick="bookSeat(8)">
8
</div>

</div>

<!-- BARIS 4 -->
<div class="row">

<div class="seat" id="seat-9" onclick="bookSeat(9)">
9
</div>

<div class="seat" id="seat-10" onclick="bookSeat(10)">
10
</div>

<div class="seat" id="seat-11" onclick="bookSeat(11)">
11
</div>

</div>

<!-- BARIS 5 -->
<div class="row">

<div class="seat" id="seat-12" onclick="bookSeat(12)">
12
</div>

<div class="seat" id="seat-13" onclick="bookSeat(13)">
13
</div>

<div class="seat" id="seat-14" onclick="bookSeat(14)">
14
</div>

<div class="seat" id="seat-15" onclick="bookSeat(15)">
15
</div>

</div>

</div>

<button onclick="cancelBooking()">
Batalkan Booking Saya
</button>

<div class="legend">

<div>
<span class="dot blue"></span>
Kursi Kosong
</div>

<div>
<span class="dot red"></span>
Sudah Dibooking Orang Lain
</div>

<div>
<span class="dot green"></span>
Kursi Saya
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyB-0vQfRqo8hg8Nnx9OjdupN8_QWuDAviM",
  authDomain: "booking-elf.firebaseapp.com",
  databaseURL: "https://booking-elf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "booking-elf",
  storageBucket: "booking-elf.firebasestorage.app",
  messagingSenderId: "962719974645",
  appId: "1:962719974645:web:1a5d74ef571593f822b1bc",
  measurementId: "G-64KN3WGBCT"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let username = "";

// Simpan nama
function saveName(){

    const input = document.getElementById("nameInput").value.trim();

    if(input === ""){

        alert("Masukkan nama dulu");
        return;

    }

    username = input;

    alert("Halo " + username);

}

// Booking kursi
function bookSeat(number){

    if(username === ""){

        alert("Masukkan nama dulu");
        return;

    }

    db.ref("seats").once("value", snapshot => {

        const data = snapshot.val() || {};

        // cek apakah user sudah punya kursi
        for(let key in data){

            if(data[key].name === username){

                alert("Kamu sudah booking kursi " + key);
                return;

            }

        }

        // cek kursi sudah dipakai
        if(data[number]){

            alert("Kursi sudah dibooking oleh " + data[number].name);
            return;

        }

        // simpan booking
        db.ref("seats/" + number).set({
            name: username
        });

    });

}

// Batalkan booking
function cancelBooking(){

    if(username === ""){

        alert("Masukkan nama dulu");
        return;

    }

    db.ref("seats").once("value", snapshot => {

        const data = snapshot.val() || {};

        for(let key in data){

            if(data[key].name === username){

                db.ref("seats/" + key).remove();

                alert("Booking dibatalkan");

                return;

            }

        }

        alert("Kamu belum booking kursi");

    });

}

// realtime update
db.ref("seats").on("value", snapshot => {

    const data = snapshot.val() || {};

    // reset kursi
    for(let i=1;i<=15;i++){

        const seat = document.getElementById("seat-" + i);

        if(seat){

            seat.classList.remove("booked");
            seat.classList.remove("mine");

            seat.innerHTML = i;

        }

    }

    // tampilkan booking
    for(let key in data){

        const seat = document.getElementById("seat-" + key);

        if(seat){

            seat.innerHTML = data[key].name;

            if(data[key].name === username){

                seat.classList.add("mine");

            }else{

                seat.classList.add("booked");

            }

        }

    }

});

</script>

</body>
</html>
